appId: dev.toolman.app
productName: Toolman
directories:
  output: dist
  buildResources: build
files:
  - out/**/*
  - package.json
extraResources:
  - from: bin/toolman-community-hub
    to: bin/toolman-community-hub
    filter:
      - '**/*'
mac:
  target:
    - dmg
  category: public.app-category.productivity
  artifactName: Toolman-${version}-${arch}.${ext}
win:
  target:
    - nsis
  artifactName: Toolman-${version}-${arch}.${ext}
linux:
  target:
    - AppImage
  artifactName: Toolman-${version}-${arch}.${ext}
publish:
  provider: generic
  url: ${env.TOOLMAN_UPDATE_PUBLISH_URL}
