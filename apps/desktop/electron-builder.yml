appId: dev.toolman.app
productName: Toolman
afterPack: ../../scripts/electron-after-pack-adhoc-sign.mjs
directories:
  output: dist
  buildResources: build
files:
  - out/**/*
  - package.json
extraResources:
  - from: ../../LICENSE
    to: legal/LICENSE
  - from: ../../NOTICE.md
    to: legal/NOTICE.md
  - from: ../../THIRD_PARTY_NOTICES.md
    to: legal/THIRD_PARTY_NOTICES.md
  - from: bin/toolman-community-hub
    to: bin/toolman-community-hub
    filter:
      - '**/*'
  - from: native
    to: native
    filter:
      - '**/*.node'
  - from: resources/release.env
    to: config/release.env
  - from: resources/mcp-excel
    to: mcp-excel
    filter:
      - '**/*'
  - from: resources/mcp-docx
    to: mcp-docx
    filter:
      - '**/*'
  - from: bin/toolman-docx-core
    to: bin/toolman-docx-core
    filter:
      - '**/*'
mac:
  target:
    - dmg
  category: public.app-category.productivity
  artifactName: Toolman-${version}-${arch}.${ext}
win:
  target:
    - target: portable
      arch:
        - x64
  artifactName: Toolman-${version}-${arch}.${ext}
portable:
  artifactName: Toolman-${version}-${arch}-Portable.${ext}
linux:
  target:
    - AppImage
  artifactName: Toolman-${version}-${arch}.${ext}
publish:
  provider: generic
  url: ${env.TOOLMAN_UPDATE_PUBLISH_URL}
