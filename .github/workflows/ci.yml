name: CI

on:
  push:
    branches: [main, master]
  pull_request:

# Release commits use the tag name as the commit message (e.g. v0.2.0-rc.3).
# Skip CI on those pushes — Release Desktop already runs on the matching tag.
jobs:
  check:
    if: github.event_name == 'pull_request' || !startsWith(github.event.head_commit.message, 'v0.')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm --filter @toolman/desktop^... build

      - name: Lint (typecheck)
        run: pnpm lint

      - name: ESLint
        run: pnpm lint:eslint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Desktop coverage
        run: pnpm --filter @toolman/desktop exec vitest run --coverage

      - name: Docx integration
        run: pnpm --filter @toolman/desktop test:docx-integration

      - name: Dependency audit
        run: pnpm audit --audit-level=high

      - name: P2P schema smoke
        run: pnpm --filter @toolman/db test:p2p-schema

      - name: Auth schema smoke
        run: pnpm --filter @toolman/db test:auth-schema

      - name: P2P desktop integration
        run: pnpm --filter @toolman/desktop test:p2p-integration

      - name: Community hub Rust tests
        run: cargo test -p toolman-community-hub

  windows-check:
    if: github.event_name == 'pull_request' || !startsWith(github.event.head_commit.message, 'v0.')
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm --filter @toolman/desktop^... build

      - name: Typecheck
        run: pnpm --filter @toolman/desktop typecheck

      - name: Unit tests
        run: pnpm --filter @toolman/desktop test

  p2p-native-macos:
    if: github.event_name == 'pull_request' || !startsWith(github.event.head_commit.message, 'v0.')
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build P2P native (current arch)
        run: pnpm build:p2p

      - name: Build libp2p native (current arch)
        run: pnpm build:libp2p

      - name: Rust unit tests (toolman-p2p)
        run: cargo test -p toolman-p2p

      - name: Rust unit tests (toolman-libp2p)
        run: cargo test -p toolman-libp2p

      - name: Verify ping
        run: node -e "const arch=process.platform+'-'+process.arch; const m=require('./apps/desktop/native/toolman-p2p.'+arch+'.node'); if(m.ping()!=='pong') process.exit(1)"

      - name: Build desktop for E2E
        run: |
          pnpm build:community-hub
          pnpm --filter @toolman/desktop^... build
          pnpm --filter @toolman/desktop build

      - name: Playwright E2E (GA smoke)
        run: pnpm --filter @toolman/desktop test:e2e:quick
        env:
          CI: true
          ELECTRON_RUN_AS_NODE: ''
