name: Release Desktop

on:
  workflow_dispatch:
    inputs:
      channel:
        description: Update channel
        required: true
        default: staging
        type: choice
        options:
          - staging
          - stable
      publish:
        description: Upload to CDN (requires secrets)
        required: true
        default: false
        type: boolean
      notes:
        description: Release notes (manifest.json)
        required: false
        type: string
  push:
    tags:
      - 'v*'

env:
  TOOLMAN_UPDATE_FEED_URL: https://releases.toolman.app
  CSC_IDENTITY_AUTO_DISCOVERY: false

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Prepare release.env
        env:
          TOOLMAN_RELEASE_ENV: ${{ secrets.TOOLMAN_RELEASE_ENV }}
        run: |
          if [ -n "$TOOLMAN_RELEASE_ENV" ]; then
            mkdir -p apps/desktop/resources
            printf '%s\n' "$TOOLMAN_RELEASE_ENV" > "$GITHUB_WORKSPACE/apps/desktop/resources/release.env.pre"
            echo "TOOLMAN_RELEASE_ENV_FILE=$GITHUB_WORKSPACE/apps/desktop/resources/release.env.pre" >> "$GITHUB_ENV"
            echo "Prepared release.env from TOOLMAN_RELEASE_ENV"
          else
            echo "::warning::TOOLMAN_RELEASE_ENV secret is not set — login will not work in packaged builds"
          fi

      - name: Build desktop release (macOS)
        env:
          TOOLMAN_UPDATE_CHANNEL: ${{ github.event_name == 'workflow_dispatch' && inputs.channel || 'stable' }}
          TOOLMAN_RELEASE_NOTES: ${{ github.event_name == 'workflow_dispatch' && inputs.notes || format('Tag {0}', github.ref_name) }}
        run: bash scripts/build-desktop-release.sh

      - name: Publish to CDN
        if: github.event_name == 'workflow_dispatch' && inputs.publish
        env:
          TOOLMAN_UPDATE_CHANNEL: ${{ inputs.channel }}
          TOOLMAN_UPDATE_PLATFORM: darwin
          TOOLMAN_UPDATE_ARCH: arm64
          TOOLMAN_UPDATE_S3_BUCKET: ${{ secrets.TOOLMAN_UPDATE_S3_BUCKET }}
          TOOLMAN_UPDATE_S3_ENDPOINT: ${{ secrets.TOOLMAN_UPDATE_S3_ENDPOINT }}
          TOOLMAN_UPDATE_S3_PREFIX: ${{ secrets.TOOLMAN_UPDATE_S3_PREFIX }}
          AWS_ACCESS_KEY_ID: ${{ secrets.TOOLMAN_UPDATE_AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.TOOLMAN_UPDATE_AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: bash scripts/publish-update-feed.sh

      - name: Upload release artifacts
        uses: actions/upload-artifact@v7
        with:
          name: desktop-macos-${{ github.event_name == 'workflow_dispatch' && inputs.channel || 'stable' }}
          path: |
            apps/desktop/dist/*.dmg
            apps/desktop/dist/latest-mac.yml
            apps/desktop/dist/*-manifest.json

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Prepare release.env
        env:
          TOOLMAN_RELEASE_ENV: ${{ secrets.TOOLMAN_RELEASE_ENV }}
        shell: bash
        run: |
          if [ -n "$TOOLMAN_RELEASE_ENV" ]; then
            mkdir -p apps/desktop/resources
            printf '%s\n' "$TOOLMAN_RELEASE_ENV" > "$GITHUB_WORKSPACE/apps/desktop/resources/release.env.pre"
            echo "TOOLMAN_RELEASE_ENV_FILE=$GITHUB_WORKSPACE/apps/desktop/resources/release.env.pre" >> "$GITHUB_ENV"
            echo "Prepared release.env from TOOLMAN_RELEASE_ENV"
          else
            echo "::warning::TOOLMAN_RELEASE_ENV secret is not set — login will not work in packaged builds"
          fi

      - name: Build desktop release (Windows)
        shell: bash
        env:
          TOOLMAN_UPDATE_CHANNEL: ${{ github.event_name == 'workflow_dispatch' && inputs.channel || 'stable' }}
          TOOLMAN_RELEASE_NOTES: ${{ github.event_name == 'workflow_dispatch' && inputs.notes || format('Tag {0}', github.ref_name) }}
        run: bash scripts/build-desktop-release.sh

      - name: Publish to CDN
        if: github.event_name == 'workflow_dispatch' && inputs.publish
        shell: bash
        env:
          TOOLMAN_UPDATE_CHANNEL: ${{ inputs.channel }}
          TOOLMAN_UPDATE_PLATFORM: win32
          TOOLMAN_UPDATE_ARCH: x64
          TOOLMAN_UPDATE_S3_BUCKET: ${{ secrets.TOOLMAN_UPDATE_S3_BUCKET }}
          TOOLMAN_UPDATE_S3_ENDPOINT: ${{ secrets.TOOLMAN_UPDATE_S3_ENDPOINT }}
          TOOLMAN_UPDATE_S3_PREFIX: ${{ secrets.TOOLMAN_UPDATE_S3_PREFIX }}
          AWS_ACCESS_KEY_ID: ${{ secrets.TOOLMAN_UPDATE_AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.TOOLMAN_UPDATE_AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: bash scripts/publish-update-feed.sh

      - name: Upload release artifacts
        uses: actions/upload-artifact@v7
        with:
          name: desktop-windows-${{ github.event_name == 'workflow_dispatch' && inputs.channel || 'stable' }}
          path: |
            apps/desktop/dist/*-Portable.exe
            apps/desktop/dist/latest.yml
            apps/desktop/dist/*-manifest.json

  publish-github-release:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: release-artifacts

      - name: Flatten artifacts for upload
        run: |
          mkdir -p release-upload
          find release-artifacts -type f \( -name '*.dmg' -o -name '*-Portable.exe' -o -name '*-manifest.json' \) -exec cp {} release-upload/ \;
          ls -la release-upload/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Toolman ${{ github.ref_name }}
          generate_release_notes: true
          files: release-upload/*
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') }}

  verify-staging-feed:
    needs: [build-macos]
    if: github.event_name == 'workflow_dispatch' && inputs.publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Verify remote OTA feed
        env:
          TOOLMAN_UPDATE_CHANNEL: ${{ inputs.channel }}
        run: bash scripts/verify-update-feed.sh "$TOOLMAN_UPDATE_FEED_URL" "$TOOLMAN_UPDATE_CHANNEL" darwin arm64
