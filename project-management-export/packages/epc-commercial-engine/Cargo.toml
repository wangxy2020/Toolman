[package]
name = "epc-commercial-engine"
version = "0.1.0"
edition = "2021"
description = "Cherry Studio EPC 商用闭源引擎（工程量与进度款数据统计）"
license = "PROPRIETARY"

[[bin]]
name = "epc-commercial-cli"
path = "src/main.rs"

[lib]
name = "epc_commercial_engine"
path = "src/lib.rs"

[dependencies]
calamine = { version = "0.26", features = ["dates"] }
rust_xlsxwriter = "0.79"
walkdir = "2"
regex = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sha2 = "0.10"
hex = "0.4"
machine-uid = "0.5"
hmac = "0.12"
base64 = "0.22"
chrono = { version = "0.4", features = ["serde"] }
thiserror = "2"
anyhow = "1"

[profile.release]
lto = true
codegen-units = 1
strip = true
